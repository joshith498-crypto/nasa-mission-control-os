<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Quantum OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mac-menu-bar">
        <div class="menu-left">
            <span class="menu-item bold">🛰️ Core OS</span>
            <span class="menu-item">Finder</span>
            <span class="menu-item">Terminal</span>
            <span class="menu-item">Arcade</span>
        </div>
        <div class="menu-right">
            <span class="menu-item">📶 100% Uplink</span>
            <span class="menu-item">🔋 98% Field Core</span>
            <span class="menu-item" id="live-clock">--:--</span>
        </div>
    </div>

    <div class="desktop-workspace">
        <div class="desktop-shortcut">📁 <span>Finder</span></div>
        <div class="desktop-shortcut">📟 <span>Terminal</span></div>
        <div class="desktop-shortcut">🎮 <span>Arcade</span></div>
        <div class="desktop-shortcut">🚀 <span>Missions</span></div>
        <div class="desktop-shortcut">⚙️ <span>Settings</span></div>
        <div class="desktop-shortcut" onclick="openWindow('weather-window')">☁️ <span>Weather</span></div>
    </div>

    <div class="mac-window" id="weather-window" style="display:none; position:absolute; top:100px; left:100px; z-index:99;">
        <div class="window-header">
            Weather Uplink <button onclick="closeWindow('weather-window')" style="float:right;">✕</button>
        </div>
        <div class="window-body">
            <button onclick="fetchWeather()">Sync Local Temp</button>
            <p id="weather-display">READY FOR DATA...</p>
        </div>
    </div>

    <div class="dock-container">
        <div class="mac-dock">
            <div class="dock-item">📁</div>
            <div class="dock-item">📟</div>
            <div class="dock-item">🎮</div>
            <div class="dock-item">🚀</div>
            <div class="dock-item">⚙️</div>
            <div class="dock-separator"></div>
            <div class="dock-trash-bin">🗑️</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
